[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 20000
evm_version = "cancun"
fork_url = "unichain"
fork_chain_id = 130

[lint]
severity = ["high", "med"]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "preserve"

[rpc_endpoints]
base = "<your_url>"
arbitrum = "<your_url>"
unichain = "<your_url>"

[etherscan]
base = { key = "<your_key>" }

